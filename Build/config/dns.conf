# DNS Server Configuration
listen_address = 0.0.0.0
listen_port = 53

# Upstream DNS servers (comma separated)
upstream_servers = 202.96.128.86:53,202.96.128.166:53

# Forward timeout (seconds) and max retries
forward_timeout = 5
forward_max_retries = 2

# Cache size (max entries) and cleanup interval (seconds)
cache_max_entries = 10000
cache_cleanup_interval = 60

# Hosts file path (relative to executable or absolute)
hosts_file = hosts.txt

# Blocklist file path (one domain per line, supports *.example.com wildcards)
blocklist_file = config/blocklist.txt

# Whitelist file path (one domain per line, takes priority over blocklist)
whitelist_file = config/whitelist.txt

# Log level: 0=DEBUG 1=INFO 2=WARN 3=ERROR
log_level = 0
log_file = dns-server.log

# Stats report interval (seconds), 0 to disable
stats_interval = 300
